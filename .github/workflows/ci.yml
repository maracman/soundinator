name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install
        run: pip install -e ".[dev]"
      - name: JS syntax check
        run: |
          node --check web/static/app.js
          node --check web/static/synth.js
          node --check web/static/factory-presets.js
      - name: Tests
        run: python -m pytest -q
