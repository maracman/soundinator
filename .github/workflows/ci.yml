name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install
        run: |
          pip install -e ".[dev]"
          npm ci
      - name: JS syntax check
        run: |
          node --check web/static/app.js
          node --check web/static/synth.js
          node --check web/static/params.js
          node --check web/static/factory-presets.js
      - name: Tone model assertions
        run: node scripts/verify_tone_model.mjs
      - name: Tests
        run: |
          npm test
          python -m pytest -q
      - name: Browser smoke
        run: |
          npx playwright install --with-deps chromium
          npm run test:browser
