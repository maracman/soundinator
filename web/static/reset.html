<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Soundinator — Reset password</title>
<link rel="icon" type="image/svg+xml" href="/app-icon.svg"/>
<style>
  /* Mirrors login.html so the account pages read as one surface. */
  :root{
    --bg:#16181d; --surface:#1c1f25; --surface2:#24272e; --border:#2b2f37;
    --border2:#363b45; --text:#e8eaee; --text2:#9aa0ab; --text3:#5d636e;
    --accent:#f5a623; --accent2:#ffc768; --red:#ef4444; --green:#22c55e;
    --radius:14px; --radius-sm:8px;
    --font:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,sans-serif;
    --brand-font:ui-rounded,"SF Pro Rounded","Hiragino Maru Gothic ProN","Quicksand","Comfortaa",var(--font);
  }
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;
    background:radial-gradient(1200px 600px at 50% -10%,#20242c,var(--bg));
    color:var(--text);font-family:var(--font);padding:24px}
  .card{width:100%;max-width:400px;background:var(--surface);border:1px solid var(--border2);
    border-radius:var(--radius);box-shadow:0 24px 70px rgba(0,0,0,.55);overflow:hidden}
  .auth-brand{display:flex;align-items:center;gap:12px;padding:24px 24px 2px}
  .auth-brand-icon{width:44px;height:44px;border-radius:11px;flex:none;box-shadow:0 2px 10px rgba(0,0,0,.35)}
  .auth-brand-text h1{margin:0;font-family:var(--brand-font);font-size:1.45rem;font-weight:800;
    letter-spacing:.01em;color:var(--text);line-height:1.1}
  .auth-sub{margin:2px 0 0;color:var(--text3);font-size:.82rem}
  form{display:flex;flex-direction:column;gap:14px;padding:20px 24px 24px}
  label{display:flex;flex-direction:column;gap:7px;text-transform:uppercase;letter-spacing:.07em;
    font-size:.66rem;font-weight:700;color:var(--text3)}
  input{width:100%;padding:11px 12px;background:var(--bg);color:var(--text);
    border:1px solid var(--border2);border-radius:7px;font-family:inherit;font-size:.92rem}
  input:focus{outline:none;border-color:var(--accent)}
  .btn{margin-top:8px;padding:12px;border:1px solid var(--accent);border-radius:7px;
    background:var(--accent);color:#000;font-family:inherit;font-weight:700;font-size:.95rem;cursor:pointer}
  .btn:hover:not(:disabled){filter:brightness(1.08)}
  .btn:disabled{opacity:.55;cursor:default}
  .msg{font-size:.82rem;min-height:1.1em;margin-top:-4px}
  .msg.error{color:var(--red)}
  .msg.ok{color:var(--green)}
  .hint{margin:-4px 0 0;font-size:.72rem;color:var(--text3);line-height:1.55}
  .hint a{color:var(--accent)}
</style>
</head>
<body>
<div class="card">
  <div class="auth-brand">
    <img class="auth-brand-icon" src="/app-icon.svg" alt=""/>
    <div class="auth-brand-text">
      <h1>Soundinator</h1>
      <p class="auth-sub">Choose a new password</p>
    </div>
  </div>

  <form id="form">
    <label for="password">New password
      <input id="password" type="password" autocomplete="new-password" required minlength="8"/>
    </label>
    <label for="confirm">Repeat it
      <input id="confirm" type="password" autocomplete="new-password" required minlength="8"/>
    </label>
    <button class="btn" id="submit" type="submit">Set new password</button>
    <div class="msg" id="msg"></div>
    <p class="hint">Signing in again everywhere will be required — resetting
      logs the account out of all devices. <a href="/login">Back to sign in</a></p>
  </form>
</div>

<script>
  const $ = (id) => document.getElementById(id);
  const token = new URLSearchParams(location.search).get("token") || "";
  const setMsg = (text, kind) => {
    const m = $("msg");
    m.textContent = text || "";
    m.className = "msg" + (kind ? " " + kind : "");
  };
  if (!token) setMsg("This page needs a reset link from your email.", "error");

  $("form").addEventListener("submit", async (e) => {
    e.preventDefault();
    if ($("password").value !== $("confirm").value) {
      setMsg("Those passwords don't match.", "error");
      return;
    }
    $("submit").disabled = true;
    setMsg("Saving…");
    try {
      const r = await fetch("/api/auth/reset", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ token, password: $("password").value }),
      });
      const d = await r.json();
      if (!r.ok) throw new Error(d.error || `HTTP ${r.status}`);
      setMsg("Password updated — sign in with it now.", "ok");
      setTimeout(() => location.replace("/login"), 1400);
    } catch (err) {
      setMsg(err.message || "Something went wrong", "error");
      $("submit").disabled = false;
    }
  });
</script>
</body>
</html>
